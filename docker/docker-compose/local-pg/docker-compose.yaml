name: hindsight-local-pg

services:
  db:
    image: pgvector/pgvector:pg${HINDSIGHT_DB_VERSION:-18}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HINDSIGHT_DB_USER:-hindsight_user}
      POSTGRES_PASSWORD: ${HINDSIGHT_DB_PASSWORD:?Set HINDSIGHT_DB_PASSWORD in .env}
      POSTGRES_DB: ${HINDSIGHT_DB_NAME:-hindsight_db}
    volumes:
      - hindsight_pg_data:/var/lib/postgresql/${HINDSIGHT_DB_VERSION:-18}/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:${HINDSIGHT_TEI_IMAGE_TAG:-120-1.9}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    gpus: all
    volumes:
      - hindsight_tei_embed_data:/data
    command:
      - --model-id
      - ${HINDSIGHT_API_EMBEDDINGS_TEI_MODEL_ID:-BAAI/bge-base-en-v1.5}
      - --dtype
      - ${HINDSIGHT_TEI_DTYPE:-float16}
      - --port
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:${HINDSIGHT_TEI_IMAGE_TAG:-120-1.9}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    gpus: all
    volumes:
      - hindsight_tei_rerank_data:/data
    command:
      - --model-id
      - ${HINDSIGHT_API_RERANKER_TEI_MODEL_ID:-BAAI/bge-reranker-base}
      - --dtype
      - ${HINDSIGHT_TEI_DTYPE:-float16}
      - --port
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  hindsight-api:
    build:
      context: ../../..
      dockerfile: docker/standalone/Dockerfile
      target: api-only
      args:
        INCLUDE_LOCAL_MODELS: "false"
        PRELOAD_ML_MODELS: "false"
    image: ghcr.io/vectorize-io/hindsight-api:${HINDSIGHT_VERSION:-local-codex-dev}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
    ports:
      - "${HINDSIGHT_HOST_API_PORT:-8889}:8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HINDSIGHT_API_DATABASE_URL: postgresql://${HINDSIGHT_DB_USER:-hindsight_user}:${HINDSIGHT_DB_PASSWORD:?Set HINDSIGHT_DB_PASSWORD in .env}@db:5432/${HINDSIGHT_DB_NAME:-hindsight_db}
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai-codex}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-5.4}
      HINDSIGHT_API_LLM_REASONING_EFFORT: ${HINDSIGHT_API_LLM_REASONING_EFFORT:-xhigh}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_API_LLM_BASE_URL:-http://host.docker.internal:2455/backend-api/codex}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: tei
      HINDSIGHT_API_EMBEDDINGS_TEI_URL: http://tei-embed:80
      HINDSIGHT_API_RERANKER_PROVIDER: tei
      HINDSIGHT_API_RERANKER_TEI_URL: http://tei-rerank:80
      HINDSIGHT_API_RERANKER_TEI_BATCH_SIZE: ${HINDSIGHT_API_RERANKER_TEI_BATCH_SIZE:-32}
      HINDSIGHT_API_RERANKER_TEI_MAX_CONCURRENT: ${HINDSIGHT_API_RERANKER_TEI_MAX_CONCURRENT:-2}
      CODEX_LB_API_KEY: ${CODEX_LB_API_KEY:?Set CODEX_LB_API_KEY in .env}
      HINDSIGHT_API_VECTOR_EXTENSION: pgvector
      HINDSIGHT_CP_DATAPLANE_API_URL: http://127.0.0.1:8888
    volumes:
      - type: bind
        source: ${HINDSIGHT_CODEX_AUTH_DIR:?Set HINDSIGHT_CODEX_AUTH_DIR in .env}
        target: /home/hindsight/.codex
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8888/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  hindsight-cp:
    image: ghcr.io/vectorize-io/hindsight:${HINDSIGHT_CP_VERSION:-latest}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    depends_on:
      hindsight-api:
        condition: service_healthy
    ports:
      - "${HINDSIGHT_HOST_CP_PORT:-9999}:9999"
    environment:
      HINDSIGHT_ENABLE_API: "false"
      HINDSIGHT_ENABLE_CP: "true"
      HINDSIGHT_CP_DATAPLANE_API_URL: http://hindsight-api:8888
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9999/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  hindsight_pg_data:
    name: hindsight_local_pg_data
  hindsight_tei_embed_data:
    name: hindsight_local_tei_embed_data
  hindsight_tei_rerank_data:
    name: hindsight_local_tei_rerank_data
